name: TG Proxy Auto Hunter

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

# 核心权限声明：明确告知 GitHub 允许此脚本写入内容
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # 使用系统内置的 GITHUB_TOKEN，无需手动创建 PAT
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Fetch Script
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # 脚本内部也使用系统内置 Token
        run: python fetch_tg.py

      - name: Commit and Push
        run: |
          # 配置 Git 机器人身份
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add .
          
          # 检查是否有更新，无更新则优雅退出
          if git diff --staged --quiet; then
            echo "No changes detected. Skipping commit."
            exit 0
          fi
          
          git commit -m "Update TG Proxies $(date '+%Y-%m-%d %H:%M:%S')"
          
          # 使用内置的授权机制推送
          git push origin HEAD:main
