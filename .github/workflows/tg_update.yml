name: TG Proxy Auto Hunter

on:
  schedule:
    - cron: '0 */2 * * *' # 每 2 小时运行一次
  workflow_dispatch: # 支持手动触发

# 强制使用 Node.js 24 环境以适配 2026 年的要求
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 升级到支持 Node.js 24 的 v4 版本
      - name: Checkout code
        uses: actions/checkout@v4

      # 升级到支持 Node.js 24 的 v5 版本
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # 使用更现代的 Python 版本

      - name: Install dependencies
        run: pip install requests

      - name: Run Fetch Script
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python fetch_tg.py

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          # 增加 pull --rebase 避免多人操作或并发冲突
          git pull --rebase origin main
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update TG Proxies $(date)" && git push)
