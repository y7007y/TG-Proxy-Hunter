name: TG Proxy Auto Hunter

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # 使用你配置的 Secret，并关闭持久化认证以允许手动配置 URL
          token: ${{ secrets.GH_TOKEN }}
          persist-credentials: false 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Fetch Script
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python fetch_tg.py

      - name: Commit and Push
        run: |
          # 1. 强制配置 Git 机器人身份
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 2. 检查是否有文件变更，防止空提交报错
          git add .
          if git diff --staged --quiet; then
            echo "No changes found. Skipping push."
            exit 0
          fi
          
          # 3. 核心修正：手动构建带 Token 的远程 URL 绕过鉴权
          # 注意：这里的 GH_TOKEN 必须是你 Secret 里的名字
          REMOTE_URL="https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git"
          
          git commit -m "Update TG Proxies $(date '+%Y-%m-%d %H:%M:%S')"
          git push "$REMOTE_URL" HEAD:main --force
